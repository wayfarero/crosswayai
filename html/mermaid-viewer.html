<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrossWAI Mermaid Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --panel2: #1f2937;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Segoe UI, Arial, sans-serif;
    }
    .viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #020617;
      overflow: hidden;
    }
    #stage {
      width: 100%;
      height: 100%;
      overflow: auto;
      cursor: grab;
      display: block;
    }
    #stage.dragging {
      cursor: grabbing;
    }
    #diagram {
      width: max-content;
      height: max-content;
      min-width: 100%;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    #diagram svg {
      max-width: none;
      max-height: none;
      background: white;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
    button {
      border: 1px solid #4b5563;
      background: var(--panel2);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { filter: brightness(1.12); }
    .overlay {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: calc(100vw - 20px);
      background: rgba(3,7,18,0.6);
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 6px;
      backdrop-filter: blur(4px);
    }
    #status {
      position: absolute;
      left: 10px;
      bottom: 10px;
      background: rgba(3,7,18,0.6);
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 12px;
      max-width: calc(100vw - 240px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <section class="viewer">
    <div id="stage">
      <div id="diagram"></div>
    </div>
    <div class="overlay">
      <button id="exportPng">Export PNG</button>
      <button id="zoomIn">+</button>
      <button id="zoomOut">-</button>
      <button id="fit">Fit</button>
      <button id="reset">Reset</button>
    </div>
    <div id="status">Ready.</div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      deterministicIds: true,
      er: {
        layoutDirection: 'LR'
      }
    });

    const status = document.getElementById('status');
    const stage = document.getElementById('stage');
    const diagram = document.getElementById('diagram');

    const params = new URLSearchParams(window.location.search);
    const defaultMarkdownPath = params.get('file') || '.crosswayai/mermaid/impact_runAnalysis.p.md';

    let currentZoom = 1;
    let svgBaseWidth = 0;
    let svgBaseHeight = 0;

    function setStatus(text, isError = false) {
      status.textContent = text;
      status.style.color = isError ? '#fca5a5' : '#9ca3af';
    }

    function activateDiagramSizing() {
      const svg = diagram.querySelector('svg');
      if (!svg) return;

      const viewBox = (svg.getAttribute('viewBox') || '').trim().split(/\s+/).map(Number);
      if (viewBox.length === 4 && Number.isFinite(viewBox[2]) && Number.isFinite(viewBox[3]) && viewBox[2] > 0 && viewBox[3] > 0) {
        svgBaseWidth = viewBox[2];
        svgBaseHeight = viewBox[3];
      } else {
        const fallbackWidth = Number(svg.getAttribute('width')) || svg.clientWidth || 1200;
        const fallbackHeight = Number(svg.getAttribute('height')) || svg.clientHeight || 800;
        svgBaseWidth = Math.max(100, fallbackWidth);
        svgBaseHeight = Math.max(100, fallbackHeight);
      }

      fitDiagramToViewport();
      activateDiagramInteractivity();
    }

    function centerStageScroll() {
      const left = Math.max(0, (stage.scrollWidth - stage.clientWidth) / 2);
      const top = Math.max(0, (stage.scrollHeight - stage.clientHeight) / 2);
      stage.scrollLeft = left;
      stage.scrollTop = top;
    }

    function applyZoom(zoomValue, centerScroll = false) {
      const svg = diagram.querySelector('svg');
      if (!svg || !svgBaseWidth || !svgBaseHeight) {
        return;
      }
      const clamped = Math.min(10, Math.max(0.1, zoomValue));
      currentZoom = clamped;
      svg.style.width = `${Math.round(svgBaseWidth * currentZoom)}px`;
      svg.style.height = `${Math.round(svgBaseHeight * currentZoom)}px`;
      if (centerScroll) {
        centerStageScroll();
      }
      setStatus(`Rendered at ${Math.round(currentZoom * 100)}% zoom.`);
    }

    function fitDiagramToViewport() {
      if (!svgBaseWidth || !svgBaseHeight) {
        return;
      }
      const availableWidth = Math.max(120, stage.clientWidth - 36);
      const availableHeight = Math.max(120, stage.clientHeight - 36);
      const fitZoom = Math.min(availableWidth / svgBaseWidth, availableHeight / svgBaseHeight);
      applyZoom(fitZoom, true);
    }

    function activateDiagramInteractivity() {
      const svg = diagram.querySelector('svg');
      if (!svg) return;

      const HIGHLIGHT_COLOR = '#DC2626';
      const CLICK_TOLERANCE = 24;
      let activeSelection = null;

      function isDiagramEdgeElement(edgeEl) {
        if (!edgeEl) {
          return false;
        }
        const tagName = (edgeEl.tagName || '').toLowerCase();
        if (!['path', 'line', 'polyline'].includes(tagName)) {
          return false;
        }
        if (edgeEl.closest('defs')) {
          return false;
        }
        const markerStart = edgeEl.getAttribute('marker-start');
        const markerEnd = edgeEl.getAttribute('marker-end');
        const edgeClass = edgeEl.getAttribute('class') || '';
        const edgeId = edgeEl.id || '';
        if (markerStart || markerEnd) {
          return true;
        }
        return /(^|\s)(edge|edgePath|relation|relationshipLine)(\s|$)/i.test(edgeClass) || edgeId.includes('L-');
      }

      function clearActiveSelection() {
        if (!activeSelection) {
          return;
        }
        const { pathElement, originalStroke, originalStrokeWidth, originalStyleStroke, originalStyleStrokeWidth } = activeSelection;
        if (pathElement && pathElement.isConnected) {
          if (originalStroke === null) {
            pathElement.removeAttribute('stroke');
          } else {
            pathElement.setAttribute('stroke', originalStroke);
          }
          if (originalStrokeWidth === null) {
            pathElement.removeAttribute('stroke-width');
          } else {
            pathElement.setAttribute('stroke-width', originalStrokeWidth);
          }
          if (originalStyleStroke === null) {
            pathElement.style.removeProperty('stroke');
          } else {
            pathElement.style.stroke = originalStyleStroke;
          }
          if (originalStyleStrokeWidth === null) {
            pathElement.style.removeProperty('stroke-width');
          } else {
            pathElement.style.strokeWidth = originalStyleStrokeWidth;
          }
        }
        activeSelection = null;
      }

      function highlightEdge(edgeEl) {
        clearActiveSelection();

        const originalStroke = edgeEl.hasAttribute('stroke') ? edgeEl.getAttribute('stroke') : null;
        const originalStrokeWidth = edgeEl.hasAttribute('stroke-width') ? edgeEl.getAttribute('stroke-width') : null;
        const originalStyleStroke = edgeEl.style.stroke || null;
        const originalStyleStrokeWidth = edgeEl.style.strokeWidth || null;

        edgeEl.setAttribute('stroke', HIGHLIGHT_COLOR);
        edgeEl.style.stroke = HIGHLIGHT_COLOR;

        activeSelection = {
          pathElement: edgeEl,
          originalStroke,
          originalStrokeWidth,
          originalStyleStroke,
          originalStyleStrokeWidth
        };
      }

      function createClickTargetForEdge(edgeEl) {
        const tagName = (edgeEl.tagName || '').toLowerCase();
        const clickTarget = document.createElementNS('http://www.w3.org/2000/svg', tagName);
        if (tagName === 'path') {
          clickTarget.setAttribute('d', edgeEl.getAttribute('d') || '');
        } else if (tagName === 'line') {
          clickTarget.setAttribute('x1', edgeEl.getAttribute('x1') || '0');
          clickTarget.setAttribute('y1', edgeEl.getAttribute('y1') || '0');
          clickTarget.setAttribute('x2', edgeEl.getAttribute('x2') || '0');
          clickTarget.setAttribute('y2', edgeEl.getAttribute('y2') || '0');
        } else if (tagName === 'polyline') {
          clickTarget.setAttribute('points', edgeEl.getAttribute('points') || '');
        }
        clickTarget.setAttribute('fill', 'none');
        clickTarget.setAttribute('stroke', 'transparent');
        clickTarget.setAttribute('stroke-width', String(CLICK_TOLERANCE));
        clickTarget.setAttribute('pointer-events', 'stroke');
        clickTarget.setAttribute('class', 'crosswayai-click-target');
        clickTarget.style.cursor = 'pointer';
        return clickTarget;
      }

      const allEdges = svg.querySelectorAll('path, line, polyline');
      allEdges.forEach((edgeEl) => {
        if (!isDiagramEdgeElement(edgeEl)) {
          return;
        }

        edgeEl.style.cursor = 'pointer';
        const clickTarget = createClickTargetForEdge(edgeEl);
        edgeEl.parentNode.insertBefore(clickTarget, edgeEl.nextSibling);

        clickTarget.addEventListener('click', (event) => {
          event.stopPropagation();
          event.preventDefault();

          if (activeSelection && activeSelection.pathElement === edgeEl) {
            clearActiveSelection();
            return;
          }
          highlightEdge(edgeEl);
        });
      });

      function highlightArrow(pathElement, pathId, color, svgElement) {
        const originalStroke = pathElement.getAttribute('stroke') || '#000';
        const originalStrokeWidth = pathElement.getAttribute('stroke-width') || '2';

        // Store original values for reset
        pathElement.dataset.originalStroke = originalStroke;
        pathElement.dataset.originalStrokeWidth = originalStrokeWidth;
        pathElement.dataset.isHighlighted = 'true';

        // Change the arrow itself to red and thicker
        pathElement.setAttribute('stroke', color);
        pathElement.setAttribute('stroke-width', '4');

        const overlayLayer = createOrGetOverlayLayer(svgElement);
        if (overlayLayer) {
          const overlayPath = pathElement.cloneNode(true);
          const safePathId = String(pathId || 'path').replace(/[^a-zA-Z0-9_-]/g, '_');
          const overlayId = `highlight-overlay-${safePathId}-${Date.now()}`;
          overlayPath.setAttribute('id', overlayId);
          overlayPath.setAttribute('stroke', color);
          overlayPath.setAttribute('stroke-width', '4');
          overlayPath.setAttribute('fill', 'none');
          overlayPath.style.pointerEvents = 'none';
          overlayLayer.appendChild(overlayPath);
          pathElement.dataset.highlightOverlayId = overlayId;
        }

        // Find and highlight connected nodes
        const allGroups = svgElement.querySelectorAll('g[id*="node-"]');
        allGroups.forEach((group) => {
          const rect = group.querySelector('rect');
          if (rect) {
            // Add colored border/highlight boxes
            const highlightBox = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            const x = parseFloat(rect.getAttribute('x'));
            const y = parseFloat(rect.getAttribute('y'));
            const width = parseFloat(rect.getAttribute('width'));
            const height = parseFloat(rect.getAttribute('height'));

            highlightBox.setAttribute('x', x - HIGHLIGHT_BOX_PADDING);
            highlightBox.setAttribute('y', y - HIGHLIGHT_BOX_PADDING);
            highlightBox.setAttribute('width', width + (HIGHLIGHT_BOX_PADDING * 2));
            highlightBox.setAttribute('height', height + (HIGHLIGHT_BOX_PADDING * 2));
            highlightBox.setAttribute('fill', 'none');
            highlightBox.setAttribute('stroke', color);
            highlightBox.setAttribute('stroke-width', '2');
            highlightBox.setAttribute('stroke-dasharray', '5,5');
            highlightBox.setAttribute('rx', '4');
            highlightBox.setAttribute('class', `highlight-box-${pathId}`);
            highlightBox.style.pointerEvents = 'none';

            group.appendChild(highlightBox);
          }
        });
      }

      function removeArrowHighlight(pathId, svgElement, pathElement) {
        if (pathElement && pathElement.dataset.isHighlighted === 'true') {
          // Restore original stroke and width
          pathElement.setAttribute('stroke', pathElement.dataset.originalStroke);
          pathElement.setAttribute('stroke-width', pathElement.dataset.originalStrokeWidth);
          pathElement.dataset.isHighlighted = 'false';

          const overlayId = pathElement.dataset.highlightOverlayId;
          if (overlayId) {
            const overlayPath = svgElement.querySelector(`[id="${overlayId}"]`);
            if (overlayPath) {
              overlayPath.remove();
            }
            delete pathElement.dataset.highlightOverlayId;
          }

          // Remove highlight boxes
          const highlightBoxes = svgElement.querySelectorAll(`.highlight-box-${pathId}`);
          highlightBoxes.forEach((box) => box.remove());
        }
      }
      svg.addEventListener('click', () => {
        clearActiveSelection();
      });
    }

    function normalizeErKeySyntax(code) {
      return (code || '')
        .replace(/\bPK[_/ ]FK\b/gi, 'PK, FK')
        .replace(/\bFK[_/ ]PK\b/gi, 'FK, PK');
    }

    function createOrGetOverlayLayer(svg) {
      if (!svg) {
        return null;
      }

      let layer = svg.querySelector('#crosswayai-edge-overlay');
      if (!layer) {
        layer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        layer.setAttribute('id', 'crosswayai-edge-overlay');
        layer.style.pointerEvents = 'none';
        svg.appendChild(layer);
      } else if (layer.parentNode !== svg) {
        svg.appendChild(layer);
      }

      return layer;
    }

    function bringRelationshipLayersToFront(svg) {
      if (!svg) {
        return;
      }

      const candidates = [
        '.edgePaths',
        '.edgeLabels',
        '.relationships',
        '.relationshipLine',
        'g[class*="edge"]',
        'g[class*="relationship"]',
        'g[id*="edge"]',
        'g[id*="rel"]'
      ];
      const moved = new Set();

      for (const selector of candidates) {
        const groups = svg.querySelectorAll(selector);
        groups.forEach((group) => {
          if (!group || !group.parentNode || moved.has(group)) {
            return;
          }
          group.parentNode.appendChild(group);
          moved.add(group);
        });
      }

      const edgePaths = svg.querySelectorAll('path[marker-end], path[marker-start], path.relationshipLine');
      edgePaths.forEach((path) => {
        if (!path || !path.parentNode || path.closest('defs')) {
          return;
        }
        path.parentNode.appendChild(path);
      });

      createOrGetOverlayLayer(svg);
    }

    function organizeErDiagram(code) {
      const source = (code || '').replace(/\r\n/g, '\n');
      const lines = source.split('\n');
      const headerIndex = lines.findIndex((line) => /^\s*erDiagram\b/i.test(line));
      if (headerIndex === -1) {
        return code;
      }

      const entityBlocks = new Map();
      const relationships = [];
      const passthroughLines = [];
      const entityDeclPattern = /^\s*([A-Za-z0-9_]+)\s*\{\s*$/;
      const relationshipPattern = /^\s*([A-Za-z0-9_]+)\s+([^\s]+)\s+([A-Za-z0-9_]+)\s*:\s*(.+?)\s*$/;

      for (let i = headerIndex + 1; i < lines.length; i++) {
        const line = lines[i];
        const trimmed = line.trim();
        if (!trimmed) {
          continue;
        }

        const entityMatch = line.match(entityDeclPattern);
        if (entityMatch) {
          const entityName = entityMatch[1];
          const blockLines = [line];
          let closed = false;

          for (i = i + 1; i < lines.length; i++) {
            blockLines.push(lines[i]);
            if (/^\s*}\s*$/.test(lines[i])) {
              closed = true;
              break;
            }
          }

          if (!closed) {
            return code;
          }

          entityBlocks.set(entityName, blockLines);
          continue;
        }

        const relMatch = line.match(relationshipPattern);
        if (relMatch && relMatch[2].includes('--')) {
          relationships.push({
            left: relMatch[1],
            right: relMatch[3],
            raw: trimmed
          });
          continue;
        }

        passthroughLines.push(trimmed);
      }

      if (entityBlocks.size < 2 || relationships.length === 0) {
        return code;
      }

      const nodeSet = new Set(entityBlocks.keys());
      const adjacency = new Map();
      nodeSet.forEach((name) => adjacency.set(name, new Set()));
      relationships.forEach((rel) => {
        if (!nodeSet.has(rel.left) || !nodeSet.has(rel.right)) {
          return;
        }
        adjacency.get(rel.left).add(rel.right);
        adjacency.get(rel.right).add(rel.left);
      });

      const degree = (name) => (adjacency.get(name) ? adjacency.get(name).size : 0);
      const nodes = Array.from(nodeSet).sort((a, b) => a.localeCompare(b));

      const components = [];
      const seen = new Set();
      for (const node of nodes) {
        if (seen.has(node)) continue;
        const queue = [node];
        seen.add(node);
        const comp = [];
        while (queue.length) {
          const cur = queue.shift();
          comp.push(cur);
          const neighbors = Array.from(adjacency.get(cur) || []).sort((a, b) => a.localeCompare(b));
          for (const next of neighbors) {
            if (seen.has(next)) continue;
            seen.add(next);
            queue.push(next);
          }
        }
        components.push(comp);
      }

      function buildComponentOrder(componentNodes) {
        if (componentNodes.length <= 1) {
          return componentNodes.slice();
        }

        const inComponent = new Set(componentNodes);
        const compEdges = [];
        for (const rel of relationships) {
          if (inComponent.has(rel.left) && inComponent.has(rel.right)) {
            compEdges.push([rel.left, rel.right]);
          }
        }

        function orderIndexMap(currentOrder) {
          return new Map(currentOrder.map((n, i) => [n, i]));
        }

        function edgeStats(currentOrder) {
          const idx = orderIndexMap(currentOrder);
          let edgeLength = 0;
          let crossings = 0;
          let sideCongestion = 0;
          const sideCounts = new Map();

          for (const nodeName of currentOrder) {
            sideCounts.set(nodeName, { left: 0, right: 0 });
          }

          for (let i = 0; i < compEdges.length; i++) {
            const [a1, b1] = compEdges[i];
            const l1 = idx.get(a1);
            const r1 = idx.get(b1);
            const s1 = Math.min(l1, r1);
            const e1 = Math.max(l1, r1);
            edgeLength += (e1 - s1);

            const leftNode = l1 < r1 ? a1 : b1;
            const rightNode = l1 < r1 ? b1 : a1;
            sideCounts.get(leftNode).right++;
            sideCounts.get(rightNode).left++;

            for (let j = i + 1; j < compEdges.length; j++) {
              const [a2, b2] = compEdges[j];
              const l2 = idx.get(a2);
              const r2 = idx.get(b2);
              const s2 = Math.min(l2, r2);
              const e2 = Math.max(l2, r2);
              const isCrossing = (s1 < s2 && s2 < e1 && e1 < e2) || (s2 < s1 && s1 < e2 && e2 < e1);
              if (isCrossing) {
                crossings++;
              }
            }
          }

          for (const counts of sideCounts.values()) {
            const leftOverflow = Math.max(0, counts.left - 2);
            const rightOverflow = Math.max(0, counts.right - 2);
            sideCongestion += (leftOverflow * leftOverflow) + (rightOverflow * rightOverflow);
          }

          return { crossings, edgeLength, sideCongestion };
        }

        function score(currentOrder) {
          const stats = edgeStats(currentOrder);
          // Crossings dominate, then long edges, then same-side crowding near node borders.
          return (stats.crossings * 200000) + (stats.edgeLength * 8) + (stats.sideCongestion * 500);
        }

        function buildBarycentricOrder(initialOrder, iterations = 12) {
          let order = initialOrder.slice();
          for (let iteration = 0; iteration < iterations; iteration++) {
            const idx = orderIndexMap(order);
            const scored = order.map((name) => {
              const neighbors = Array.from(adjacency.get(name) || []).filter((n) => inComponent.has(n));
              if (!neighbors.length) {
                return { name, bary: idx.get(name), deg: degree(name) };
              }
              const avg = neighbors.reduce((sum, n) => sum + idx.get(n), 0) / neighbors.length;
              return { name, bary: avg, deg: degree(name) };
            });

            scored.sort((a, b) => {
              if (a.bary !== b.bary) return a.bary - b.bary;
              if (b.deg !== a.deg) return b.deg - a.deg;
              return a.name.localeCompare(b.name);
            });
            order = scored.map((s) => s.name);
          }
          return order;
        }

        function improveOrder(initialOrder) {
          let order = initialOrder.slice();
          let bestScore = score(order);
          let improved = true;
          let guard = 0;

          while (improved && guard < 300) {
            guard++;
            improved = false;

            // Adjacent swaps quickly remove many local crossings.
            for (let i = 0; i < order.length - 1; i++) {
              const candidate = order.slice();
              const tmp = candidate[i];
              candidate[i] = candidate[i + 1];
              candidate[i + 1] = tmp;
              const candidateScore = score(candidate);
              if (candidateScore < bestScore) {
                order = candidate;
                bestScore = candidateScore;
                improved = true;
              }
            }

            // Single-node reinsert pass addresses stuck local minima.
            for (let i = 0; i < order.length; i++) {
              const node = order[i];
              let bestLocal = order;
              let bestLocalScore = bestScore;

              for (let target = 0; target < order.length; target++) {
                if (target === i) continue;
                const candidate = order.slice();
                candidate.splice(i, 1);
                candidate.splice(target, 0, node);
                const candidateScore = score(candidate);
                if (candidateScore < bestLocalScore) {
                  bestLocal = candidate;
                  bestLocalScore = candidateScore;
                }
              }

              if (bestLocalScore < bestScore) {
                order = bestLocal;
                bestScore = bestLocalScore;
                improved = true;
              }
            }
          }

          return order;
        }

        const baseOrder = componentNodes
          .slice()
          .sort((a, b) => {
            const d = degree(b) - degree(a);
            if (d !== 0) return d;
            return a.localeCompare(b);
          });

        const candidateOrders = [
          buildBarycentricOrder(baseOrder),
          buildBarycentricOrder(baseOrder.slice().reverse()),
          buildBarycentricOrder(componentNodes.slice().sort((a, b) => a.localeCompare(b))),
          buildBarycentricOrder(componentNodes.slice().sort((a, b) => b.localeCompare(a)))
        ];

        let bestOrder = candidateOrders[0];
        let bestOrderScore = score(bestOrder);
        for (let i = 1; i < candidateOrders.length; i++) {
          const candidateScore = score(candidateOrders[i]);
          if (candidateScore < bestOrderScore) {
            bestOrder = candidateOrders[i];
            bestOrderScore = candidateScore;
          }
        }

        const improved = improveOrder(bestOrder);
        const improvedReversed = improveOrder(bestOrder.slice().reverse());
        return score(improved) <= score(improvedReversed) ? improved : improvedReversed;
      }

      const orderedComponents = components
        .map((comp) => buildComponentOrder(comp))
        .sort((a, b) => {
          const aDegree = a.reduce((sum, name) => sum + degree(name), 0);
          const bDegree = b.reduce((sum, name) => sum + degree(name), 0);
          if (bDegree !== aDegree) return bDegree - aDegree;
          if (b.length !== a.length) return b.length - a.length;
          return a[0].localeCompare(b[0]);
        });

      const orderedEntities = orderedComponents.flat();
      const orderIndex = new Map(orderedEntities.map((name, idx) => [name, idx]));

      const orderedRelationships = relationships.slice().sort((a, b) => {
        const aMin = Math.min(orderIndex.get(a.left) ?? 999999, orderIndex.get(a.right) ?? 999999);
        const bMin = Math.min(orderIndex.get(b.left) ?? 999999, orderIndex.get(b.right) ?? 999999);
        if (aMin !== bMin) return aMin - bMin;

        const aSpan = Math.abs((orderIndex.get(a.left) ?? 999999) - (orderIndex.get(a.right) ?? 999999));
        const bSpan = Math.abs((orderIndex.get(b.left) ?? 999999) - (orderIndex.get(b.right) ?? 999999));
        if (aSpan !== bSpan) return aSpan - bSpan;

        const aLeft = orderIndex.get(a.left) ?? 999999;
        const bLeft = orderIndex.get(b.left) ?? 999999;
        if (aLeft !== bLeft) return aLeft - bLeft;

        const aRight = orderIndex.get(a.right) ?? 999999;
        const bRight = orderIndex.get(b.right) ?? 999999;
        if (aRight !== bRight) return aRight - bRight;

        return a.raw.localeCompare(b.raw);
      });

      const rebuilt = ['erDiagram'];
      for (const entityName of orderedEntities) {
        const block = entityBlocks.get(entityName);
        if (!block) continue;
        rebuilt.push(...block);
      }

      passthroughLines.forEach((line) => rebuilt.push(`  ${line}`));
      orderedRelationships.forEach((rel) => rebuilt.push(`  ${rel.raw}`));
      return rebuilt.join('\n');
    }

    async function renderDiagram(code) {
      const mermaidCode = organizeErDiagram(normalizeErKeySyntax(code)).trim();
      if (!mermaidCode) {
        diagram.innerHTML = '';
        setStatus('No Mermaid content to render.', true);
        return;
      }

      setStatus('Rendering...');

      try {
        diagram.innerHTML = '';
        const id = 'm' + Date.now();
        const result = await mermaid.render(id, mermaidCode);
        diagram.innerHTML = result.svg;

        activateDiagramSizing();
        setStatus('Rendered. Use controls to navigate.');
      } catch (err) {
        setStatus('Render failed: ' + (err && err.message ? err.message : String(err)), true);
      }
    }

    function extractMermaidBlocks(markdownText) {
      const blocks = [];
      const regex = /```[ \t]*mermaid(?:[ \t]+[^\r\n]*)?[ \t]*\r?\n([\s\S]*?)```/gi;
      let match;
      while ((match = regex.exec(markdownText)) !== null) {
        const block = (match[1] || '').trim();
        if (block) {
          blocks.push(block);
        }
      }

      if (!blocks.length) {
        const fallback = (markdownText || '').trim();
        if (/^(?:graph|flowchart|sequenceDiagram|classDiagram|stateDiagram|erDiagram|journey|gantt|pie|mindmap|timeline|gitGraph|quadrantChart|xychart-beta)\b/i.test(fallback)) {
          blocks.push(fallback);
        }
      }

      return blocks;
    }

    function buildMarkdownRequestUrl(markdownPath) {
      const trimmed = (markdownPath || '').trim();
      if (!trimmed) {
        return '';
      }

      if (/^https?:\/\//i.test(trimmed)) {
        return trimmed;
      }

      const normalized = trimmed
        .replace(/\\/g, '/')
        .replace(/^\/+/, '');

      const encodedPath = normalized
        .split('/')
        .map(segment => encodeURIComponent(segment))
        .join('/');

      return `${window.location.origin}/${encodedPath}`;
    }

    function buildExportFileName() {
      const sourcePath = (defaultMarkdownPath || 'diagram').replace(/\\/g, '/');
      const sourceFileName = sourcePath.split('/').pop() || 'diagram';
      const withoutExt = sourceFileName.replace(/\.md$/i, '') || 'diagram';
      const safeBase = withoutExt.replace(/[^a-zA-Z0-9._-]/g, '_').slice(0, 100) || 'diagram';
      return safeBase;
    }

    function serializeSvg(svgEl) {
      const serializer = new XMLSerializer();
      const clonedSvg = svgEl.cloneNode(true);
      clonedSvg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      return serializer.serializeToString(clonedSvg);
    }

    async function svgToPngDataUrl(svgEl) {
      const viewBoxParts = (svgEl.getAttribute('viewBox') || '').trim().split(/\s+/).map(Number);
      const width = (viewBoxParts.length === 4 && Number.isFinite(viewBoxParts[2]) && viewBoxParts[2] > 0)
        ? Math.ceil(viewBoxParts[2])
        : Math.ceil(Number(svgEl.getAttribute('width')) || svgEl.clientWidth || 1200);
      const height = (viewBoxParts.length === 4 && Number.isFinite(viewBoxParts[3]) && viewBoxParts[3] > 0)
        ? Math.ceil(viewBoxParts[3])
        : Math.ceil(Number(svgEl.getAttribute('height')) || svgEl.clientHeight || 800);

      const svgText = serializeSvg(svgEl);
      const svgBlob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
      const svgUrl = URL.createObjectURL(svgBlob);

      try {
        const image = await new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = svgUrl;
        });

        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, width);
        canvas.height = Math.max(1, height);
        const context = canvas.getContext('2d');
        context.fillStyle = '#ffffff';
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/png');
      } finally {
        URL.revokeObjectURL(svgUrl);
      }
    }

    async function uploadExport(payload) {
      const response = await fetch('/__crosswayai/export', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      const result = await response.json();
      if (!response.ok || !result || !result.ok) {
        throw new Error((result && result.error) || `HTTP ${response.status}`);
      }
      return result;
    }

    async function exportDiagramAsPng() {
      const svg = diagram.querySelector('svg');
      if (!svg) {
        setStatus('No rendered diagram available to export.', true);
        return;
      }

      setStatus('Exporting PNG...');

      try {
        const dataUrl = await svgToPngDataUrl(svg);
        const fileBase = buildExportFileName();
        const result = await uploadExport({
          format: 'png',
          fileName: `${fileBase}.png`,
          dataUrl
        });
        setStatus(`Exported to ${result.relativePath}`);
      } catch (err) {
        const message = err && err.message ? err.message : String(err);
        const shouldFallbackToSvg = /tainted canvas|tainted canvases/i.test(message);

        if (!shouldFallbackToSvg) {
          setStatus('Export failed: ' + message, true);
          return;
        }

        try {
          setStatus('PNG blocked by browser security. Exporting SVG...');
          const fileBase = buildExportFileName();
          const svgText = serializeSvg(svg);
          const result = await uploadExport({
            format: 'svg',
            fileName: `${fileBase}.svg`,
            svgText
          });
          setStatus(`Exported SVG to ${result.relativePath}`);
        } catch (fallbackErr) {
          setStatus('Export failed: ' + (fallbackErr && fallbackErr.message ? fallbackErr.message : String(fallbackErr)), true);
        }
      }
    }

    async function loadFromMarkdown(path) {
      const markdownPath = (path || '').trim();
      if (!markdownPath) {
        setStatus('No markdown file path provided.', true);
        return;
      }

      const requestUrl = buildMarkdownRequestUrl(markdownPath);
      setStatus('Loading markdown...');

      try {
        let response;
        try {
          response = await fetch(requestUrl, { cache: 'no-store' });
        } catch (_) {
          const retryUrl = `${requestUrl}${requestUrl.includes('?') ? '&' : '?'}_ts=${Date.now()}`;
          response = await fetch(retryUrl, { cache: 'no-store' });
        }

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const markdown = await response.text();

        const blocks = extractMermaidBlocks(markdown);
        if (!blocks.length) {
          setStatus('No Mermaid blocks found in markdown.', true);
          return;
        }

        await renderDiagram(blocks[0]);
        setStatus(`Loaded Mermaid from ${markdownPath}.`);
      } catch (err) {
        setStatus('Markdown load failed: ' + (err && err.message ? err.message : String(err)), true);
      }
    }

    document.getElementById('exportPng').addEventListener('click', exportDiagramAsPng);
    document.getElementById('zoomIn').addEventListener('click', () => applyZoom(currentZoom * 1.2, true));
    document.getElementById('zoomOut').addEventListener('click', () => applyZoom(currentZoom / 1.2, true));
    document.getElementById('fit').addEventListener('click', fitDiagramToViewport);
    document.getElementById('reset').addEventListener('click', () => applyZoom(1, true));

    // Mouse wheel zoom functionality
    stage.addEventListener('wheel', (event) => {
      if (event.ctrlKey || event.metaKey) {
        event.preventDefault();
        const zoomFactor = event.deltaY > 0 ? 0.9 : 1.1;
        applyZoom(currentZoom * zoomFactor, false);
      }
    });

    // Drag to pan functionality
    let isDragging = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragStartScrollLeft = 0;
    let dragStartScrollTop = 0;

    stage.addEventListener('mousedown', (event) => {
      // Don't start dragging if clicking on an SVG path (arrow) or text element
      if (event.target.tagName === 'path' || event.target.tagName === 'text' || event.target.tagName === 'tspan') {
        return;
      }

      isDragging = true;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      dragStartScrollLeft = stage.scrollLeft;
      dragStartScrollTop = stage.scrollTop;
      stage.classList.add('dragging');
    });

    document.addEventListener('mousemove', (event) => {
      if (!isDragging) return;

      const deltaX = event.clientX - dragStartX;
      const deltaY = event.clientY - dragStartY;

      stage.scrollLeft = dragStartScrollLeft - deltaX;
      stage.scrollTop = dragStartScrollTop - deltaY;
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      stage.classList.remove('dragging');
    });

    loadFromMarkdown(defaultMarkdownPath);
  </script>
</body>
</html>
