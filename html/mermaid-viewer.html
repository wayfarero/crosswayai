<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrossWAI Mermaid Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f172a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --panel2: #1f2937;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Segoe UI, Arial, sans-serif;
    }
    .viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #020617;
      overflow: hidden;
    }
    #stage {
      width: 100%;
      height: 100%;
      overflow: auto;
      cursor: grab;
      display: block;
    }
    #stage.dragging {
      cursor: grabbing;
    }
    #diagram {
      width: max-content;
      height: max-content;
      min-width: 100%;
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    #diagram svg {
      max-width: none;
      max-height: none;
      background: white;
      border-radius: 10px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
    button {
      border: 1px solid #4b5563;
      background: var(--panel2);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { filter: brightness(1.12); }
    .overlay {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: calc(100vw - 20px);
      background: rgba(3,7,18,0.6);
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 6px;
      backdrop-filter: blur(4px);
    }
    #status {
      position: absolute;
      left: 10px;
      bottom: 10px;
      background: rgba(3,7,18,0.6);
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 12px;
      max-width: calc(100vw - 240px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #legend {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background: rgba(3,7,18,0.72);
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 6px 9px;
      min-width: 0;
      max-width: min(320px, calc(100vw - 20px));
      color: #d1d5db;
      font-size: 12px;
      line-height: 1.35;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
    }
    #legend[hidden] {
      display: none;
    }
    #legend .legend-title {
      color: #f3f4f6;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 0;
    }
    #legend .legend-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 0;
    }
    #legend .legend-body {
      display: none;
    }
    #legend:hover {
      padding: 8px 10px;
      min-width: 220px;
    }
    #legend:hover .legend-header {
      margin-bottom: 6px;
    }
    #legend:hover .legend-body {
      display: block;
    }
    #legend .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }
    #legend .legend-node {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      background: #ffffff;
      border: 2px solid #6b7280;
      flex: 0 0 auto;
    }
    #legend .legend-line {
      width: 16px;
      height: 0;
      border-top: 3px solid #6b7280;
      border-radius: 2px;
      flex: 0 0 auto;
    }
    #legend .legend-label {
      color: #d1d5db;
      min-width: 0;
    }
    #edgeTooltip {
      position: fixed;
      z-index: 30;
      max-width: min(420px, calc(100vw - 20px));
      background: rgba(3, 7, 18, 0.95);
      border: 1px solid #374151;
      border-radius: 8px;
      color: #e5e7eb;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
      pointer-events: none;
      white-space: normal;
    }
    #edgeTooltip[hidden] {
      display: none;
    }
    #edgeTooltip ul {
      margin: 0;
      padding-left: 16px;
    }
    #edgeTooltip li {
      margin: 2px 0;
    }
  </style>
</head>
<body>
  <section class="viewer">
    <div id="stage">
      <div id="diagram"></div>
    </div>
    <div class="overlay">
      <button id="exportPng">Export Image</button>
      <button id="zoomIn">+</button>
      <button id="zoomOut">-</button>
      <button id="fit">Fit</button>
      <button id="reset">Reset</button>
    </div>
    <div id="status">Ready.</div>
    <div id="legend" hidden></div>
    <div id="edgeTooltip" hidden></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
      deterministicIds: true,
      maxTextSize: 1000000,
      er: {
        layoutDirection: 'LR'
      }
    });

    const status = document.getElementById('status');
    const stage = document.getElementById('stage');
    const diagram = document.getElementById('diagram');
    const legend = document.getElementById('legend');
    const edgeTooltip = document.getElementById('edgeTooltip');

    const params = new URLSearchParams(window.location.search);
    const defaultMarkdownPath = params.get('file') || '.crosswayai/mermaid/impact_runAnalysis.p.md';

    const LINK_TYPE_COLORS = {
      include: '#ed1e97',
      run: '#1d6be0',
      invoke: '#1d6be0',
      inherits: '#18e2ce',
      implements: '#1fcce2',
      circular: '#ff0000',
      selected: '#f97316',
      undefined: '#555555'
    };
    let currentZoom = 1;
    let svgBaseWidth = 0;
    let svgBaseHeight = 0;

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function hideEdgeTooltip(force = false) {
      if (!force && window.CROSSWAY_EDGE_TOOLTIP_PINNED) {
        return;
      }
      edgeTooltip.hidden = true;
      edgeTooltip.innerHTML = '';
    }

    function positionEdgeTooltip(clientX, clientY) {
      if (edgeTooltip.hidden) {
        return;
      }

      const offset = 12;
      let left = clientX + offset;
      let top = clientY + offset;
      const rect = edgeTooltip.getBoundingClientRect();

      if (left + rect.width > window.innerWidth - 8) {
        left = Math.max(8, clientX - rect.width - offset);
      }
      if (top + rect.height > window.innerHeight - 8) {
        top = Math.max(8, clientY - rect.height - offset);
      }

      edgeTooltip.style.left = `${left}px`;
      edgeTooltip.style.top = `${top}px`;
    }

    function showEdgeTooltip(items, event) {
      if (!items || items.length === 0) {
        hideEdgeTooltip();
        return;
      }

      const renderedItems = items
        .map((item) => String(item || '').trim())
        .filter(Boolean)
        .map((item) => `<li>${escapeHtml(item)}</li>`)
        .join('');

      if (!renderedItems) {
        hideEdgeTooltip();
        return;
      }

      edgeTooltip.innerHTML = `<ul>${renderedItems}</ul>`;
      edgeTooltip.hidden = false;
      positionEdgeTooltip(event.clientX, event.clientY);
    }

    function setStatus(text, isError = false) {
      status.textContent = text;
      status.style.color = isError ? '#fca5a5' : '#9ca3af';
    }

    function isPackageDiagram(mermaidCode, markdownPath) {
      const pathText = String(markdownPath || '');
      if (/[/\\]package_[^/\\]+\.md$/i.test(pathText) || /^package_[^/\\]+\.md$/i.test(pathText)) {
        return true;
      }

      // Package diagrams are generated externally and do not include CrossWay metadata.
      // If a future package flow adds metadata, path naming above still keeps this excluded.
      return false;
    }

    function isCrosswayDependencyDiagram(mermaidCode) {
      const source = String(mermaidCode || '');
      if (/^\s*%%CROSSWAY_SOURCE_NODE:/m.test(source)) {
        return true;
      }

      const knownColors = Object.values(LINK_TYPE_COLORS)
        .map(color => color.replace('#', '\\#'))
        .join('|');

      return new RegExp(`stroke\\s*:\\s*(?:${knownColors})`, 'i').test(source);
    }

    function buildLegendRow(type, label) {
      const color = LINK_TYPE_COLORS[type] || '#6b7280';
      return `<div class="legend-row"><span class="legend-line" style="border-top-color:${color};"></span><span class="legend-label">${label}</span></div>`;
    }

    function updateLegend(mermaidCode, markdownPath) {
      const showLegend = isCrosswayDependencyDiagram(mermaidCode) && !isPackageDiagram(mermaidCode, markdownPath);
      if (!showLegend) {
        legend.hidden = true;
        legend.innerHTML = '';
        return;
      }

      legend.innerHTML = [
        '<div class="legend-header">',
        '<div class="legend-title">Legend</div>',
        '</div>',
        '<div class="legend-body">',
        buildLegendRow('include', 'include'),
        buildLegendRow('run', 'run / invoke'),
        buildLegendRow('inherits', 'inherits'),
        buildLegendRow('implements', 'implements'),
        buildLegendRow('circular', 'circular'),
        buildLegendRow('selected', 'Selected'),
        buildLegendRow('undefined', 'multiple'),
        '</div>'
      ].join('');

      // Prevent dragging/panning while interacting with legend.
      legend.onmousedown = (event) => event.stopPropagation();
      legend.hidden = false;
    }

    function activateDiagramSizing() {
      const svg = diagram.querySelector('svg');
      if (!svg) return;

      const viewBox = (svg.getAttribute('viewBox') || '').trim().split(/\s+/).map(Number);
      if (viewBox.length === 4 && Number.isFinite(viewBox[2]) && Number.isFinite(viewBox[3]) && viewBox[2] > 0 && viewBox[3] > 0) {
        svgBaseWidth = viewBox[2];
        svgBaseHeight = viewBox[3];
      } else {
        const fallbackWidth = Number(svg.getAttribute('width')) || svg.clientWidth || 1200;
        const fallbackHeight = Number(svg.getAttribute('height')) || svg.clientHeight || 800;
        svgBaseWidth = Math.max(100, fallbackWidth);
        svgBaseHeight = Math.max(100, fallbackHeight);
      }

      fitDiagramToViewport();
      activateDiagramInteractivity();
    }

    function centerStageScroll() {
      const left = Math.max(0, (stage.scrollWidth - stage.clientWidth) / 2);
      const top = Math.max(0, (stage.scrollHeight - stage.clientHeight) / 2);
      stage.scrollLeft = left;
      stage.scrollTop = top;
    }

    function applyZoom(zoomValue, centerScroll = false) {
      const svg = diagram.querySelector('svg');
      if (!svg || !svgBaseWidth || !svgBaseHeight) {
        return;
      }
      const clamped = Math.min(10, Math.max(0.1, zoomValue));
      currentZoom = clamped;
      svg.style.width = `${Math.round(svgBaseWidth * currentZoom)}px`;
      svg.style.height = `${Math.round(svgBaseHeight * currentZoom)}px`;
      if (centerScroll) {
        centerStageScroll();
      }
      setStatus(`Rendered at ${Math.round(currentZoom * 100)}% zoom.`);
    }

    function fitDiagramToViewport() {
      if (!svgBaseWidth || !svgBaseHeight) {
        return;
      }
      const availableWidth = Math.max(120, stage.clientWidth - 36);
      const availableHeight = Math.max(120, stage.clientHeight - 36);
      const fitZoom = Math.min(availableWidth / svgBaseWidth, availableHeight / svgBaseHeight);
      applyZoom(fitZoom, true);
    }

    function activateDiagramInteractivity() {
      const svg = diagram.querySelector('svg');
      if (!svg) return;

      const HIGHLIGHT_COLOR = '#f97316';
      const CLICK_TOLERANCE = 24;
      let activeSelection = null;
      let lockedNode = null;
      window.CROSSWAY_EDGE_TOOLTIP_PINNED = false;

      function isDiagramEdgeElement(edgeEl) {
        if (!edgeEl) {
          return false;
        }
        const tagName = (edgeEl.tagName || '').toLowerCase();
        if (!['path', 'line', 'polyline'].includes(tagName)) {
          return false;
        }
        if (edgeEl.closest('defs')) {
          return false;
        }
        const markerStart = edgeEl.getAttribute('marker-start');
        const markerEnd = edgeEl.getAttribute('marker-end');
        const edgeClass = edgeEl.getAttribute('class') || '';
        const edgeId = edgeEl.id || '';
        if (markerStart || markerEnd) {
          return true;
        }
        return /(^|\s)(edge|edgePath|relation|relationshipLine)(\s|$)/i.test(edgeClass) || edgeId.includes('L-');
      }

      function clearActiveSelection() {
        if (!activeSelection) {
          return;
        }
        const { pathElement, originalStroke, originalStrokeWidth, originalStyleStroke, originalStyleStrokeWidth } = activeSelection;
        if (pathElement && pathElement.isConnected) {
          if (originalStroke === null) {
            pathElement.removeAttribute('stroke');
          } else {
            pathElement.setAttribute('stroke', originalStroke);
          }
          if (originalStrokeWidth === null) {
            pathElement.removeAttribute('stroke-width');
          } else {
            pathElement.setAttribute('stroke-width', originalStrokeWidth);
          }
          if (originalStyleStroke === null) {
            pathElement.style.removeProperty('stroke');
          } else {
            pathElement.style.stroke = originalStyleStroke;
          }
          if (originalStyleStrokeWidth === null) {
            pathElement.style.removeProperty('stroke-width');
          } else {
            pathElement.style.strokeWidth = originalStyleStrokeWidth;
          }
        }
        activeSelection = null;
      }

      function highlightEdge(edgeEl) {
        clearActiveSelection();

        const originalStroke = edgeEl.hasAttribute('stroke') ? edgeEl.getAttribute('stroke') : null;
        const originalStrokeWidth = edgeEl.hasAttribute('stroke-width') ? edgeEl.getAttribute('stroke-width') : null;
        const originalStyleStroke = edgeEl.style.stroke || null;
        const originalStyleStrokeWidth = edgeEl.style.strokeWidth || null;

        edgeEl.setAttribute('stroke', HIGHLIGHT_COLOR);
        edgeEl.style.stroke = HIGHLIGHT_COLOR;

        activeSelection = {
          pathElement: edgeEl,
          originalStroke,
          originalStrokeWidth,
          originalStyleStroke,
          originalStyleStrokeWidth
        };
      }

      function createClickTargetForEdge(edgeEl) {
        const tagName = (edgeEl.tagName || '').toLowerCase();
        const clickTarget = document.createElementNS('http://www.w3.org/2000/svg', tagName);
        if (tagName === 'path') {
          clickTarget.setAttribute('d', edgeEl.getAttribute('d') || '');
        } else if (tagName === 'line') {
          clickTarget.setAttribute('x1', edgeEl.getAttribute('x1') || '0');
          clickTarget.setAttribute('y1', edgeEl.getAttribute('y1') || '0');
          clickTarget.setAttribute('x2', edgeEl.getAttribute('x2') || '0');
          clickTarget.setAttribute('y2', edgeEl.getAttribute('y2') || '0');
        } else if (tagName === 'polyline') {
          clickTarget.setAttribute('points', edgeEl.getAttribute('points') || '');
        }
        clickTarget.setAttribute('fill', 'none');
        clickTarget.setAttribute('stroke', 'transparent');
        clickTarget.setAttribute('stroke-width', String(CLICK_TOLERANCE));
        clickTarget.setAttribute('pointer-events', 'stroke');
        clickTarget.setAttribute('class', 'crosswayai-click-target');
        clickTarget.style.cursor = 'pointer';
        return clickTarget;
      }

      function fadeGraphExceptPath(pathNodes, svgElement, pathEdges) {
        const pathSet = pathNodes instanceof Set ? pathNodes : new Set(pathNodes || []);
        const keepEdges = pathEdges instanceof Set ? pathEdges : new Set();
        svgElement.querySelectorAll('.node').forEach(node => {
          const nodeId = getNodeIdentity(node);
          node.style.opacity = nodeId && pathSet.has(nodeId) ? '1' : '0.1';
        });

        const diagramEdges = getDiagramEdgeElements(svgElement);
        diagramEdges.forEach(edgeEl => {
          const edgeIds = getEdgeIdentity(edgeEl);
          const isOnPath = edgeIds ? keepEdges.has(`${edgeIds.from}->${edgeIds.to}`) : false;
          edgeEl.style.opacity = isOnPath ? '1' : '0.1';
        });

        const edgeLabelGroups = getEdgeLabelGroups(svgElement);
        edgeLabelGroups.forEach((labelGroup, index) => {
          const edgeIds = getEdgeIdentity(labelGroup);
          if (edgeIds) {
            const isOnPath = keepEdges.has(`${edgeIds.from}->${edgeIds.to}`);
            labelGroup.style.opacity = isOnPath ? '1' : '0.1';
            return;
          }

          // Some Mermaid builds do not expose edge ids on labels; in that case,
          // map labels to edges by render order.
          const mappedEdge = index < diagramEdges.length ? diagramEdges[index] : null;
          const mappedIds = getEdgeIdentity(mappedEdge);
          if (!mappedIds) {
            labelGroup.style.opacity = '1';
            return;
          }

          const isMappedEdgeOnPath = keepEdges.has(`${mappedIds.from}->${mappedIds.to}`);
          labelGroup.style.opacity = isMappedEdgeOnPath ? '1' : '0.1';
        });
      }

      function resetGraphFade(svgElement) {

        svgElement.querySelectorAll('.node').forEach(n => {
          n.style.opacity = '1';
        });

        svgElement.querySelectorAll('path, line, polyline').forEach(e => {
          if (!isDiagramEdgeElement(e)) {
            return;
          }
          e.style.opacity = '1';
        });

        getEdgeLabelGroups(svgElement).forEach((labelGroup) => {
          labelGroup.style.opacity = '1';
        });

      }

      function getEdgeLabelGroups(svgElement) {
        if (!svgElement) {
          return [];
        }

        const selectors = [
          '.edgeLabels .edgeLabel',
          'g.edgeLabel'
        ];
        const groups = new Set();

        selectors.forEach((selector) => {
          svgElement.querySelectorAll(selector).forEach((labelEl) => {
            const container = labelEl.closest('g.edgeLabel, g[id*="L-"]') || labelEl;
            groups.add(container);
          });
        });

        return Array.from(groups);
      }

      function getDiagramEdgeElements(svgElement) {
        if (!svgElement) {
          return [];
        }
        return Array.from(svgElement.querySelectorAll('path, line, polyline'))
          .filter((edgeEl) => isDiagramEdgeElement(edgeEl));
      }

      function getNodeIdentity(nodeEl) {
        if (!nodeEl) return null;
        const dataId = nodeEl.getAttribute('data-id');
        if (dataId) return dataId;

        const className = nodeEl.getAttribute('class') || '';
        const classMatch = className.match(/\bid-([A-Za-z0-9_]+)\b/);
        if (classMatch) return classMatch[1];

        const id = nodeEl.id || '';
        const flowMatch = id.match(/(?:flowchart|graph)-([A-Za-z0-9_]+)-\d+$/i);
        if (flowMatch) return flowMatch[1];

        const fallbackLabel = nodeEl.querySelector('text')?.textContent?.trim();
        return fallbackLabel || null;
      }

      function getEdgeIdentity(edgeEl) {
        if (!edgeEl) return null;

        const edgeGroup = edgeEl.closest('g.edgePath, g[id*="L-"], g[class*="edge"]');
        const edgeTokens = [
          edgeEl.getAttribute('id') || '',
          edgeEl.getAttribute('class') || '',
          edgeGroup?.getAttribute('id') || '',
          edgeGroup?.getAttribute('class') || ''
        ].join(' ');

        let match = edgeTokens.match(/L-([A-Za-z0-9_.-]+)-([A-Za-z0-9_.-]+)-\d+/);
        if (!match) {
          match = edgeTokens.match(/LS-([A-Za-z0-9_.-]+)[^A-Za-z0-9_.-]+LE-([A-Za-z0-9_.-]+)/);
        }
        if (match) {
          return {
            from: match[1],
            to: match[2]
          };
        }

        return null;
      }

      function buildEdgeGraph(svgElement) {
        const outgoing = new Map();
        const incoming = new Map();

        function add(map, from, to) {
          if (!map.has(from)) {
            map.set(from, new Set());
          }
          map.get(from).add(to);
        }

        svgElement.querySelectorAll('path, line, polyline').forEach(edgeEl => {
          if (!isDiagramEdgeElement(edgeEl)) {
            return;
          }
          const edge = getEdgeIdentity(edgeEl);
          if (!edge) {
            return;
          }
          add(outgoing, edge.from, edge.to);
          add(incoming, edge.to, edge.from);
        });

        return { outgoing, incoming };
      }

      function collectDirectedSubgraphToSource(startNodeId, sourceNodeId, svgElement) {
        if (!startNodeId || !sourceNodeId || !svgElement) {
          return {
            nodes: new Set(startNodeId ? [startNodeId] : []),
            edges: new Set()
          };
        }

        const { outgoing, incoming } = buildEdgeGraph(svgElement);
        
        function collectPaths(stepMap, reverseStepMap, edgeKeyBuilder) {
          const canReachSource = new Set([sourceNodeId]);
          const reverseQueue = [sourceNodeId];

          while (reverseQueue.length) {
            const current = reverseQueue.shift();
            const prevNodes = reverseStepMap.get(current);
            if (!prevNodes) continue;
            prevNodes.forEach((prev) => {
              if (canReachSource.has(prev)) return;
              canReachSource.add(prev);
              reverseQueue.push(prev);
            });
          }

          if (!canReachSource.has(startNodeId)) {
            return null;
          }

          const keepNodes = new Set([startNodeId]);
          const keepEdges = new Set();
          const stack = [startNodeId];
          const visited = new Set([startNodeId]);

          while (stack.length) {
            const current = stack.pop();
            const nextNodes = stepMap.get(current);
            if (!nextNodes) continue;

            nextNodes.forEach((next) => {
              if (!canReachSource.has(next)) {
                return;
              }
              keepNodes.add(next);
              keepEdges.add(edgeKeyBuilder(current, next));
              if (!visited.has(next)) {
                visited.add(next);
                stack.push(next);
              }
            });
          }

          return { nodes: keepNodes, edges: keepEdges };
        }

        // Preferred: follow arrow direction toward source.
        const forwardPaths = collectPaths(
          outgoing,
          incoming,
          (current, next) => `${current}->${next}`
        );
        if (forwardPaths) {
          return forwardPaths;
        }

        // Fallback: if hovered node is below source, keep opposite-direction route.
        const reversePaths = collectPaths(
          incoming,
          outgoing,
          (current, next) => `${next}->${current}`
        );
        if (reversePaths) {
          return reversePaths;
        }

        return {
          nodes: new Set([startNodeId]),
          edges: new Set()
        };
      }

      function getPathToRoot(nodeId) {

        const path = [];
        let current = nodeId;

        while (current) {

          path.push(current);

          const parent = window.CROSSWAY_PARENT_MAP?.[current];

          if (!parent) break;

          current = parent;

        }

        return path;

      }

      function getHighlightSubgraph(nodeId, svgElement) {
        const sourceNodeId = window.CROSSWAY_SOURCE_NODE || null;
        if (sourceNodeId) {
          return collectDirectedSubgraphToSource(nodeId, sourceNodeId, svgElement);
        }

        const path = getPathToRoot(nodeId);
        const nodes = new Set(path);
        const edges = new Set();
        for (let i = 0; i < path.length - 1; i++) {
          edges.add(`${path[i]}->${path[i + 1]}`);
        }
        return { nodes, edges };
      }

      function toUniqueList(values) {
        const unique = new Set();
        (Array.isArray(values) ? values : []).forEach((value) => {
          const text = String(value || '').trim();
          if (text) {
            unique.add(text);
          }
        });
        return Array.from(unique);
      }

    function filterTooltipCallItems(values) {
      const blocked = new Set([
        'include',
        'inherits',
        'implements',
          'extends',
          'circular',
          'undefined',
        'multiple'
      ]);

      return toUniqueList(values).filter((item) => {
        const lower = item.toLowerCase();
        if (blocked.has(lower)) {
          return false;
        }

        // Show tooltip only for explicit RUN procedure targets (path-like .p/.w).
        const normalized = lower.replace(/\//g, '\\');
        const isProcedureFile = normalized.endsWith('.p') || normalized.endsWith('.w');
        const isPathLike = normalized.includes('\\');

        return isProcedureFile && isPathLike;
      });
    }

      function getEdgeTooltipItems(edgeEl, edgeElementOrder, fallbackLabelsByEdge) {
        const edgeIds = getEdgeIdentity(edgeEl);
        if (edgeIds) {
          const metadataKey = `${edgeIds.from}->${edgeIds.to}`;
          const metadataItems = window.CROSSWAY_EDGE_DETAILS?.[metadataKey];
          if (Array.isArray(metadataItems) && metadataItems.length > 0) {
            return filterTooltipCallItems(metadataItems);
          }

          const idMappedItems = fallbackLabelsByEdge.get(metadataKey);
          if (idMappedItems && idMappedItems.length > 0) {
            return filterTooltipCallItems(idMappedItems);
          }
        }

        const mappedFallbackItems = fallbackLabelsByEdge.get(edgeEl);
        if (mappedFallbackItems && mappedFallbackItems.length > 0) {
          return filterTooltipCallItems(mappedFallbackItems);
        }

        const edgeIndex = edgeElementOrder.indexOf(edgeEl);
        if (edgeIndex >= 0) {
          const indexMappedItems = fallbackLabelsByEdge.get(edgeIndex);
          if (indexMappedItems && indexMappedItems.length > 0) {
            return filterTooltipCallItems(indexMappedItems);
          }
        }

        return [];
      }
      
      const allDiagramEdges = getDiagramEdgeElements(svg);
      const edgeLabelGroups = getEdgeLabelGroups(svg);
      const fallbackLabelsByEdge = new Map();

      edgeLabelGroups.forEach((labelGroup, index) => {
        const labelText = (labelGroup.textContent || '').trim();
        if (!labelText) {
          return;
        }

        const parsedItems = labelText
          .split(',')
          .map((item) => item.trim())
          .filter(Boolean);
        if (parsedItems.length === 0) {
          return;
        }

        const edgeIds = getEdgeIdentity(labelGroup);
        if (edgeIds) {
          const idKey = `${edgeIds.from}->${edgeIds.to}`;
          fallbackLabelsByEdge.set(idKey, parsedItems);
        }

        if (index < allDiagramEdges.length) {
          fallbackLabelsByEdge.set(allDiagramEdges[index], parsedItems);
        }

        fallbackLabelsByEdge.set(index, parsedItems);
      });

      allDiagramEdges.forEach((edgeEl) => {
        if (!isDiagramEdgeElement(edgeEl)) {
          return;
        }

        edgeEl.style.cursor = 'pointer';
        const clickTarget = createClickTargetForEdge(edgeEl);
        edgeEl.parentNode.insertBefore(clickTarget, edgeEl.nextSibling);

        clickTarget.addEventListener('click', (event) => {
          event.stopPropagation();
          event.preventDefault();

          if (activeSelection && activeSelection.pathElement === edgeEl) {
            clearActiveSelection();
            window.CROSSWAY_EDGE_TOOLTIP_PINNED = false;
            hideEdgeTooltip(true);
            return;
          } else {
            highlightEdge(edgeEl);
          }

          const items = getEdgeTooltipItems(edgeEl, allDiagramEdges, fallbackLabelsByEdge);
          window.CROSSWAY_EDGE_TOOLTIP_PINNED = true;
          showEdgeTooltip(items, event);
        });

        clickTarget.addEventListener('mouseenter', (event) => {
          if (window.CROSSWAY_EDGE_TOOLTIP_PINNED) {
            return;
          }
          const items = getEdgeTooltipItems(edgeEl, allDiagramEdges, fallbackLabelsByEdge);
          showEdgeTooltip(items, event);
        });

        clickTarget.addEventListener('mousemove', (event) => {
          if (edgeTooltip.hidden || window.CROSSWAY_EDGE_TOOLTIP_PINNED) {
            return;
          }
          positionEdgeTooltip(event.clientX, event.clientY);
        });

        clickTarget.addEventListener('mouseleave', () => {
          hideEdgeTooltip();
        });
      });

      const allNodes = svg.querySelectorAll('.node');
      
      allNodes.forEach(node => {

        node.addEventListener('mouseenter', () => {

          if (lockedNode) return;

          const nodeId = getNodeIdentity(node);
          if (!nodeId) return;

          const highlight = getHighlightSubgraph(nodeId, svg);
          fadeGraphExceptPath(highlight.nodes, svg, highlight.edges);

        });

        node.addEventListener('mouseleave', () => {
          if (lockedNode) return;
          resetGraphFade(svg);
        });

      });
      
      allNodes.forEach(node => {

        node.addEventListener('click', (event) => {

          event.stopPropagation();
          window.CROSSWAY_EDGE_TOOLTIP_PINNED = false;
          hideEdgeTooltip(true);

          const nodeId = getNodeIdentity(node);
          if (!nodeId) return;

          if (lockedNode === nodeId) {

            lockedNode = null;
            resetGraphFade(svg);
            return;

          }

          lockedNode = nodeId;

          const highlight = getHighlightSubgraph(nodeId, svg);
          fadeGraphExceptPath(highlight.nodes, svg, highlight.edges);

        });

      });


      function highlightArrow(pathElement, pathId, color, svgElement) {
        const originalStroke = pathElement.getAttribute('stroke') || '#000';
        const originalStrokeWidth = pathElement.getAttribute('stroke-width') || '2';

        // Store original values for reset
        pathElement.dataset.originalStroke = originalStroke;
        pathElement.dataset.originalStrokeWidth = originalStrokeWidth;
        pathElement.dataset.isHighlighted = 'true';

        // Change the arrow itself to red and thicker
        pathElement.setAttribute('stroke', color);
        pathElement.setAttribute('stroke-width', '4');

        const overlayLayer = createOrGetOverlayLayer(svgElement);
        if (overlayLayer) {
          const overlayPath = pathElement.cloneNode(true);
          const safePathId = String(pathId || 'path').replace(/[^a-zA-Z0-9_-]/g, '_');
          const overlayId = `highlight-overlay-${safePathId}-${Date.now()}`;
          overlayPath.setAttribute('id', overlayId);
          overlayPath.setAttribute('stroke', color);
          overlayPath.setAttribute('stroke-width', '4');
          overlayPath.setAttribute('fill', 'none');
          overlayPath.style.pointerEvents = 'none';
          overlayLayer.appendChild(overlayPath);
          pathElement.dataset.highlightOverlayId = overlayId;
        }

        // Find and highlight connected nodes
        const allGroups = svgElement.querySelectorAll('g[id*="node-"]');
        allGroups.forEach((group) => {
          const rect = group.querySelector('rect');
          if (rect) {
            // Add colored border/highlight boxes
            const highlightBox = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            const x = parseFloat(rect.getAttribute('x'));
            const y = parseFloat(rect.getAttribute('y'));
            const width = parseFloat(rect.getAttribute('width'));
            const height = parseFloat(rect.getAttribute('height'));

            highlightBox.setAttribute('x', x - HIGHLIGHT_BOX_PADDING);
            highlightBox.setAttribute('y', y - HIGHLIGHT_BOX_PADDING);
            highlightBox.setAttribute('width', width + (HIGHLIGHT_BOX_PADDING * 2));
            highlightBox.setAttribute('height', height + (HIGHLIGHT_BOX_PADDING * 2));
            highlightBox.setAttribute('fill', 'none');
            highlightBox.setAttribute('stroke', color);
            highlightBox.setAttribute('stroke-width', '2');
            highlightBox.setAttribute('stroke-dasharray', '5,5');
            highlightBox.setAttribute('rx', '4');
            highlightBox.setAttribute('class', `highlight-box-${pathId}`);
            highlightBox.style.pointerEvents = 'none';

            group.appendChild(highlightBox);
          }
        });
      }

      function removeArrowHighlight(pathId, svgElement, pathElement) {
        if (pathElement && pathElement.dataset.isHighlighted === 'true') {
          // Restore original stroke and width
          pathElement.setAttribute('stroke', pathElement.dataset.originalStroke);
          pathElement.setAttribute('stroke-width', pathElement.dataset.originalStrokeWidth);
          pathElement.dataset.isHighlighted = 'false';

          const overlayId = pathElement.dataset.highlightOverlayId;
          if (overlayId) {
            const overlayPath = svgElement.querySelector(`[id="${overlayId}"]`);
            if (overlayPath) {
              overlayPath.remove();
            }
            delete pathElement.dataset.highlightOverlayId;
          }

          // Remove highlight boxes
          const highlightBoxes = svgElement.querySelectorAll(`.highlight-box-${pathId}`);
          highlightBoxes.forEach((box) => box.remove());
        }
      }
      svg.addEventListener('click', () => {
        if (window.CROSSWAY_IGNORE_NEXT_SVG_CLICK) {
          window.CROSSWAY_IGNORE_NEXT_SVG_CLICK = false;
          return;
        }

        if (activeSelection && window.CROSSWAY_EDGE_TOOLTIP_PINNED) {
          return;
        }

        window.CROSSWAY_EDGE_TOOLTIP_PINNED = false;
        lockedNode = null;
        resetGraphFade(svg);
        hideEdgeTooltip(true);

      });

      if (window.CROSSWAY_KEYDOWN_HANDLER) {
        document.removeEventListener('keydown', window.CROSSWAY_KEYDOWN_HANDLER);
      }
      const onKeyDown = (event) => {
        if (event.key !== 'Escape') {
          return;
        }

        const hadActiveEdgeSelection = Boolean(activeSelection);
        const hadLockedNode = Boolean(lockedNode);

        window.CROSSWAY_EDGE_TOOLTIP_PINNED = false;
        clearActiveSelection();
        hideEdgeTooltip(true);

        if (hadLockedNode) {
          lockedNode = null;
          resetGraphFade(svg);
        }

        if (hadActiveEdgeSelection || hadLockedNode) {
          event.preventDefault();
          event.stopPropagation();
        }
      };
      window.CROSSWAY_KEYDOWN_HANDLER = onKeyDown;
      document.addEventListener('keydown', onKeyDown);
    }

    function normalizeErKeySyntax(code) {
      return (code || '')
        .replace(/\bPK[_/ ]FK\b/gi, 'PK, FK')
        .replace(/\bFK[_/ ]PK\b/gi, 'FK, PK');
    }

    function createOrGetOverlayLayer(svg) {
      if (!svg) {
        return null;
      }

      let layer = svg.querySelector('#crosswayai-edge-overlay');
      if (!layer) {
        layer = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        layer.setAttribute('id', 'crosswayai-edge-overlay');
        layer.style.pointerEvents = 'none';
        svg.appendChild(layer);
      } else if (layer.parentNode !== svg) {
        svg.appendChild(layer);
      }

      return layer;
    }

    function bringRelationshipLayersToFront(svg) {
      if (!svg) {
        return;
      }

      const candidates = [
        '.edgePaths',
        '.edgeLabels',
        '.relationships',
        '.relationshipLine',
        'g[class*="edge"]',
        'g[class*="relationship"]',
        'g[id*="edge"]',
        'g[id*="rel"]'
      ];
      const moved = new Set();

      for (const selector of candidates) {
        const groups = svg.querySelectorAll(selector);
        groups.forEach((group) => {
          if (!group || !group.parentNode || moved.has(group)) {
            return;
          }
          group.parentNode.appendChild(group);
          moved.add(group);
        });
      }

      const edgePaths = svg.querySelectorAll('path[marker-end], path[marker-start], path.relationshipLine');
      edgePaths.forEach((path) => {
        if (!path || !path.parentNode || path.closest('defs')) {
          return;
        }
        path.parentNode.appendChild(path);
      });

      createOrGetOverlayLayer(svg);
    }

    function organizeErDiagram(code) {
      const source = (code || '').replace(/\r\n/g, '\n');
      const lines = source.split('\n');
      const headerIndex = lines.findIndex((line) => /^\s*erDiagram\b/i.test(line));
      if (headerIndex === -1) {
        return code;
      }

      const entityBlocks = new Map();
      const relationships = [];
      const passthroughLines = [];
      const entityDeclPattern = /^\s*([A-Za-z0-9_]+)\s*\{\s*$/;
      const relationshipPattern = /^\s*([A-Za-z0-9_]+)\s+([^\s]+)\s+([A-Za-z0-9_]+)\s*:\s*(.+?)\s*$/;

      for (let i = headerIndex + 1; i < lines.length; i++) {
        const line = lines[i];
        const trimmed = line.trim();
        if (!trimmed) {
          continue;
        }

        const entityMatch = line.match(entityDeclPattern);
        if (entityMatch) {
          const entityName = entityMatch[1];
          const blockLines = [line];
          let closed = false;

          for (i = i + 1; i < lines.length; i++) {
            blockLines.push(lines[i]);
            if (/^\s*}\s*$/.test(lines[i])) {
              closed = true;
              break;
            }
          }

          if (!closed) {
            return code;
          }

          entityBlocks.set(entityName, blockLines);
          continue;
        }

        const relMatch = line.match(relationshipPattern);
        if (relMatch && relMatch[2].includes('--')) {
          relationships.push({
            left: relMatch[1],
            right: relMatch[3],
            raw: trimmed
          });
          continue;
        }

        passthroughLines.push(trimmed);
      }

      if (entityBlocks.size < 2 || relationships.length === 0) {
        return code;
      }

      const nodeSet = new Set(entityBlocks.keys());
      const adjacency = new Map();
      nodeSet.forEach((name) => adjacency.set(name, new Set()));
      relationships.forEach((rel) => {
        if (!nodeSet.has(rel.left) || !nodeSet.has(rel.right)) {
          return;
        }
        adjacency.get(rel.left).add(rel.right);
        adjacency.get(rel.right).add(rel.left);
      });

      const degree = (name) => (adjacency.get(name) ? adjacency.get(name).size : 0);
      const nodes = Array.from(nodeSet).sort((a, b) => a.localeCompare(b));

      const components = [];
      const seen = new Set();
      for (const node of nodes) {
        if (seen.has(node)) continue;
        const queue = [node];
        seen.add(node);
        const comp = [];
        while (queue.length) {
          const cur = queue.shift();
          comp.push(cur);
          const neighbors = Array.from(adjacency.get(cur) || []).sort((a, b) => a.localeCompare(b));
          for (const next of neighbors) {
            if (seen.has(next)) continue;
            seen.add(next);
            queue.push(next);
          }
        }
        components.push(comp);
      }

      function buildComponentOrder(componentNodes) {
        if (componentNodes.length <= 1) {
          return componentNodes.slice();
        }

        const inComponent = new Set(componentNodes);
        const compEdges = [];
        for (const rel of relationships) {
          if (inComponent.has(rel.left) && inComponent.has(rel.right)) {
            compEdges.push([rel.left, rel.right]);
          }
        }

        function orderIndexMap(currentOrder) {
          return new Map(currentOrder.map((n, i) => [n, i]));
        }

        function edgeStats(currentOrder) {
          const idx = orderIndexMap(currentOrder);
          let edgeLength = 0;
          let crossings = 0;
          let sideCongestion = 0;
          const sideCounts = new Map();

          for (const nodeName of currentOrder) {
            sideCounts.set(nodeName, { left: 0, right: 0 });
          }

          for (let i = 0; i < compEdges.length; i++) {
            const [a1, b1] = compEdges[i];
            const l1 = idx.get(a1);
            const r1 = idx.get(b1);
            const s1 = Math.min(l1, r1);
            const e1 = Math.max(l1, r1);
            edgeLength += (e1 - s1);

            const leftNode = l1 < r1 ? a1 : b1;
            const rightNode = l1 < r1 ? b1 : a1;
            sideCounts.get(leftNode).right++;
            sideCounts.get(rightNode).left++;

            for (let j = i + 1; j < compEdges.length; j++) {
              const [a2, b2] = compEdges[j];
              const l2 = idx.get(a2);
              const r2 = idx.get(b2);
              const s2 = Math.min(l2, r2);
              const e2 = Math.max(l2, r2);
              const isCrossing = (s1 < s2 && s2 < e1 && e1 < e2) || (s2 < s1 && s1 < e2 && e2 < e1);
              if (isCrossing) {
                crossings++;
              }
            }
          }

          for (const counts of sideCounts.values()) {
            const leftOverflow = Math.max(0, counts.left - 2);
            const rightOverflow = Math.max(0, counts.right - 2);
            sideCongestion += (leftOverflow * leftOverflow) + (rightOverflow * rightOverflow);
          }

          return { crossings, edgeLength, sideCongestion };
        }

        function score(currentOrder) {
          const stats = edgeStats(currentOrder);
          // Crossings dominate, then long edges, then same-side crowding near node borders.
          return (stats.crossings * 200000) + (stats.edgeLength * 8) + (stats.sideCongestion * 500);
        }

        function buildBarycentricOrder(initialOrder, iterations = 12) {
          let order = initialOrder.slice();
          for (let iteration = 0; iteration < iterations; iteration++) {
            const idx = orderIndexMap(order);
            const scored = order.map((name) => {
              const neighbors = Array.from(adjacency.get(name) || []).filter((n) => inComponent.has(n));
              if (!neighbors.length) {
                return { name, bary: idx.get(name), deg: degree(name) };
              }
              const avg = neighbors.reduce((sum, n) => sum + idx.get(n), 0) / neighbors.length;
              return { name, bary: avg, deg: degree(name) };
            });

            scored.sort((a, b) => {
              if (a.bary !== b.bary) return a.bary - b.bary;
              if (b.deg !== a.deg) return b.deg - a.deg;
              return a.name.localeCompare(b.name);
            });
            order = scored.map((s) => s.name);
          }
          return order;
        }

        function improveOrder(initialOrder) {
          let order = initialOrder.slice();
          let bestScore = score(order);
          let improved = true;
          let guard = 0;

          while (improved && guard < 300) {
            guard++;
            improved = false;

            // Adjacent swaps quickly remove many local crossings.
            for (let i = 0; i < order.length - 1; i++) {
              const candidate = order.slice();
              const tmp = candidate[i];
              candidate[i] = candidate[i + 1];
              candidate[i + 1] = tmp;
              const candidateScore = score(candidate);
              if (candidateScore < bestScore) {
                order = candidate;
                bestScore = candidateScore;
                improved = true;
              }
            }

            // Single-node reinsert pass addresses stuck local minima.
            for (let i = 0; i < order.length; i++) {
              const node = order[i];
              let bestLocal = order;
              let bestLocalScore = bestScore;

              for (let target = 0; target < order.length; target++) {
                if (target === i) continue;
                const candidate = order.slice();
                candidate.splice(i, 1);
                candidate.splice(target, 0, node);
                const candidateScore = score(candidate);
                if (candidateScore < bestLocalScore) {
                  bestLocal = candidate;
                  bestLocalScore = candidateScore;
                }
              }

              if (bestLocalScore < bestScore) {
                order = bestLocal;
                bestScore = bestLocalScore;
                improved = true;
              }
            }
          }

          return order;
        }

        const baseOrder = componentNodes
          .slice()
          .sort((a, b) => {
            const d = degree(b) - degree(a);
            if (d !== 0) return d;
            return a.localeCompare(b);
          });

        const candidateOrders = [
          buildBarycentricOrder(baseOrder),
          buildBarycentricOrder(baseOrder.slice().reverse()),
          buildBarycentricOrder(componentNodes.slice().sort((a, b) => a.localeCompare(b))),
          buildBarycentricOrder(componentNodes.slice().sort((a, b) => b.localeCompare(a)))
        ];

        let bestOrder = candidateOrders[0];
        let bestOrderScore = score(bestOrder);
        for (let i = 1; i < candidateOrders.length; i++) {
          const candidateScore = score(candidateOrders[i]);
          if (candidateScore < bestOrderScore) {
            bestOrder = candidateOrders[i];
            bestOrderScore = candidateScore;
          }
        }

        const improved = improveOrder(bestOrder);
        const improvedReversed = improveOrder(bestOrder.slice().reverse());
        return score(improved) <= score(improvedReversed) ? improved : improvedReversed;
      }

      const orderedComponents = components
        .map((comp) => buildComponentOrder(comp))
        .sort((a, b) => {
          const aDegree = a.reduce((sum, name) => sum + degree(name), 0);
          const bDegree = b.reduce((sum, name) => sum + degree(name), 0);
          if (bDegree !== aDegree) return bDegree - aDegree;
          if (b.length !== a.length) return b.length - a.length;
          return a[0].localeCompare(b[0]);
        });

      const orderedEntities = orderedComponents.flat();
      const orderIndex = new Map(orderedEntities.map((name, idx) => [name, idx]));

      const orderedRelationships = relationships.slice().sort((a, b) => {
        const aMin = Math.min(orderIndex.get(a.left) ?? 999999, orderIndex.get(a.right) ?? 999999);
        const bMin = Math.min(orderIndex.get(b.left) ?? 999999, orderIndex.get(b.right) ?? 999999);
        if (aMin !== bMin) return aMin - bMin;

        const aSpan = Math.abs((orderIndex.get(a.left) ?? 999999) - (orderIndex.get(a.right) ?? 999999));
        const bSpan = Math.abs((orderIndex.get(b.left) ?? 999999) - (orderIndex.get(b.right) ?? 999999));
        if (aSpan !== bSpan) return aSpan - bSpan;

        const aLeft = orderIndex.get(a.left) ?? 999999;
        const bLeft = orderIndex.get(b.left) ?? 999999;
        if (aLeft !== bLeft) return aLeft - bLeft;

        const aRight = orderIndex.get(a.right) ?? 999999;
        const bRight = orderIndex.get(b.right) ?? 999999;
        if (aRight !== bRight) return aRight - bRight;

        return a.raw.localeCompare(b.raw);
      });

      const rebuilt = ['erDiagram'];
      for (const entityName of orderedEntities) {
        const block = entityBlocks.get(entityName);
        if (!block) continue;
        rebuilt.push(...block);
      }

      passthroughLines.forEach((line) => rebuilt.push(`  ${line}`));
      orderedRelationships.forEach((rel) => rebuilt.push(`  ${rel.raw}`));
      return rebuilt.join('\n');
    }

    async function renderDiagram(code, markdownPath = defaultMarkdownPath) {
      const mermaidCode = organizeErDiagram(normalizeErKeySyntax(code)).trim();
      window.CROSSWAY_PARENT_MAP = {};
      window.CROSSWAY_SOURCE_NODE = null;
      window.CROSSWAY_EDGE_DETAILS = {};
      const sourceNodeMatch = (code || '').match(/^\s*%%CROSSWAY_SOURCE_NODE:(.*)$/m);
      if (sourceNodeMatch) {
        window.CROSSWAY_SOURCE_NODE = sourceNodeMatch[1].trim() || null;
      }
      const parentMapMatch = (code || '').match(/^\s*%%CROSSWAY_PARENT_MAP:(.*)$/m);
      if (parentMapMatch) {
        try {
          window.CROSSWAY_PARENT_MAP = JSON.parse(parentMapMatch[1]);
        } catch {
          window.CROSSWAY_PARENT_MAP = {};
        }
      }
      const edgeDetailsMatch = (code || '').match(/^\s*%%CROSSWAY_EDGE_DETAILS:(.*)$/m);
      if (edgeDetailsMatch) {
        try {
          window.CROSSWAY_EDGE_DETAILS = JSON.parse(edgeDetailsMatch[1]);
        } catch {
          window.CROSSWAY_EDGE_DETAILS = {};
        }
      }

      if (!mermaidCode) {
        diagram.innerHTML = '';
        updateLegend('', markdownPath);
        setStatus('No Mermaid content to render.', true);
        return;
      }

      updateLegend(mermaidCode, markdownPath);

      setStatus('Rendering...');

      try {
        diagram.innerHTML = '';
        window.CROSSWAY_EDGE_TOOLTIP_PINNED = false;
        hideEdgeTooltip(true);
        const id = 'm' + Date.now();
        const result = await mermaid.render(id, mermaidCode);
        diagram.innerHTML = result.svg;

        activateDiagramSizing();
        setStatus('Rendered. Use controls to navigate.');
      } catch (err) {
        setStatus('Render failed: ' + (err && err.message ? err.message : String(err)), true);
      }
    }

    function extractMermaidBlocks(markdownText) {
      const blocks = [];
      const regex = /```[ \t]*mermaid(?:[ \t]+[^\r\n]*)?[ \t]*\r?\n([\s\S]*?)```/gi;
      let match;
      while ((match = regex.exec(markdownText)) !== null) {
        const block = (match[1] || '').trim();
        if (block) {
          blocks.push(block);
        }
      }

      if (!blocks.length) {
        const fallback = (markdownText || '').trim();
        if (/^(?:graph|flowchart|sequenceDiagram|classDiagram|stateDiagram|erDiagram|journey|gantt|pie|mindmap|timeline|gitGraph|quadrantChart|xychart-beta)\b/i.test(fallback)) {
          blocks.push(fallback);
        }
      }

      return blocks;
    }

    function buildMarkdownRequestUrl(markdownPath) {
      const trimmed = (markdownPath || '').trim();
      if (!trimmed) {
        return '';
      }

      if (/^https?:\/\//i.test(trimmed)) {
        return trimmed;
      }

      const normalized = trimmed
        .replace(/\\/g, '/')
        .replace(/^\/+/, '');

      const encodedPath = normalized
        .split('/')
        .map(segment => encodeURIComponent(segment))
        .join('/');

      return `${window.location.origin}/${encodedPath}`;
    }

    function buildExportFileName() {
      const sourcePath = (defaultMarkdownPath || 'diagram').replace(/\\/g, '/');
      const sourceFileName = sourcePath.split('/').pop() || 'diagram';
      const withoutExt = sourceFileName.replace(/\.md$/i, '') || 'diagram';
      const safeBase = withoutExt.replace(/[^a-zA-Z0-9._-]/g, '_').slice(0, 100) || 'diagram';
      return safeBase;
    }

    function serializeSvg(svgEl) {
      const serializer = new XMLSerializer();
      const clonedSvg = svgEl.cloneNode(true);
      clonedSvg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      return serializer.serializeToString(clonedSvg);
    }

    async function svgToPngDataUrl(svgEl) {
      const viewBoxParts = (svgEl.getAttribute('viewBox') || '').trim().split(/\s+/).map(Number);
      const width = (viewBoxParts.length === 4 && Number.isFinite(viewBoxParts[2]) && viewBoxParts[2] > 0)
        ? Math.ceil(viewBoxParts[2])
        : Math.ceil(Number(svgEl.getAttribute('width')) || svgEl.clientWidth || 1200);
      const height = (viewBoxParts.length === 4 && Number.isFinite(viewBoxParts[3]) && viewBoxParts[3] > 0)
        ? Math.ceil(viewBoxParts[3])
        : Math.ceil(Number(svgEl.getAttribute('height')) || svgEl.clientHeight || 800);

      const svgText = serializeSvg(svgEl);
      const svgBlob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
      const svgUrl = URL.createObjectURL(svgBlob);

      try {
        const image = await new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = svgUrl;
        });

        const canvas = document.createElement('canvas');
        canvas.width = Math.max(1, width);
        canvas.height = Math.max(1, height);
        const context = canvas.getContext('2d');
        context.fillStyle = '#ffffff';
        context.fillRect(0, 0, canvas.width, canvas.height);
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/png');
      } finally {
        URL.revokeObjectURL(svgUrl);
      }
    }

    async function uploadExport(payload) {
      const response = await fetch('/__crosswayai/export', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      const result = await response.json();
      if (!response.ok || !result || !result.ok) {
        throw new Error((result && result.error) || `HTTP ${response.status}`);
      }
      return result;
    }

    async function exportDiagramAsPng() {
      const svg = diagram.querySelector('svg');
      if (!svg) {
        setStatus('No rendered diagram available to export.', true);
        return;
      }

      setStatus('Exporting image...');

      try {
        const dataUrl = await svgToPngDataUrl(svg);
        const fileBase = buildExportFileName();
        const result = await uploadExport({
          format: 'png',
          fileName: `${fileBase}.png`,
          dataUrl
        });
        setStatus(`Exported to ${result.relativePath}`);
      } catch (err) {
        const message = err && err.message ? err.message : String(err);
        const shouldFallbackToSvg = /tainted canvas|tainted canvases/i.test(message);

        if (!shouldFallbackToSvg) {
          setStatus('Export failed: ' + message, true);
          return;
        }

        try {
          setStatus('PNG blocked by browser security. Exporting as SVG...');
          const fileBase = buildExportFileName();
          const svgText = serializeSvg(svg);
          const result = await uploadExport({
            format: 'svg',
            fileName: `${fileBase}.svg`,
            svgText
          });
          setStatus(`Exported SVG to ${result.relativePath}`);
        } catch (fallbackErr) {
          setStatus('Export failed: ' + (fallbackErr && fallbackErr.message ? fallbackErr.message : String(fallbackErr)), true);
        }
      }
    }

    async function loadFromMarkdown(path) {
      const markdownPath = (path || '').trim();
      if (!markdownPath) {
        setStatus('No markdown file path provided.', true);
        return;
      }

      const requestUrl = buildMarkdownRequestUrl(markdownPath);
      setStatus('Loading markdown...');

      try {
        let response;
        try {
          response = await fetch(requestUrl, { cache: 'no-store' });
        } catch (_) {
          const retryUrl = `${requestUrl}${requestUrl.includes('?') ? '&' : '?'}_ts=${Date.now()}`;
          response = await fetch(retryUrl, { cache: 'no-store' });
        }

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const markdown = await response.text();

        const blocks = extractMermaidBlocks(markdown);
        if (!blocks.length) {
          setStatus('No Mermaid blocks found in markdown.', true);
          return;
        }

        await renderDiagram(blocks[0], markdownPath);
        setStatus(`Loaded Mermaid from ${markdownPath}.`);
      } catch (err) {
        setStatus('Markdown load failed: ' + (err && err.message ? err.message : String(err)), true);
      }
    }

    document.getElementById('exportPng').addEventListener('click', exportDiagramAsPng);
    document.getElementById('zoomIn').addEventListener('click', () => applyZoom(currentZoom * 1.2, true));
    document.getElementById('zoomOut').addEventListener('click', () => applyZoom(currentZoom / 1.2, true));
    document.getElementById('fit').addEventListener('click', fitDiagramToViewport);
    document.getElementById('reset').addEventListener('click', () => applyZoom(1, true));

    // Mouse wheel zoom functionality
    stage.addEventListener('wheel', (event) => {
      if (event.ctrlKey || event.metaKey) {
        event.preventDefault();
        const zoomFactor = event.deltaY > 0 ? 0.9 : 1.1;
        applyZoom(currentZoom * zoomFactor, false);
      }
    });

    // Drag to pan functionality
    let isDragging = false;
    let didPanDrag = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragStartScrollLeft = 0;
    let dragStartScrollTop = 0;

    stage.addEventListener('mousedown', (event) => {
      // Don't start dragging if clicking on an SVG path (arrow) or text element
      if (event.target.tagName === 'path' || event.target.tagName === 'text' || event.target.tagName === 'tspan') {
        return;
      }

      isDragging = true;
      didPanDrag = false;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      dragStartScrollLeft = stage.scrollLeft;
      dragStartScrollTop = stage.scrollTop;
      stage.classList.add('dragging');
    });

    document.addEventListener('mousemove', (event) => {
      if (!isDragging) return;

      const deltaX = event.clientX - dragStartX;
      const deltaY = event.clientY - dragStartY;
      if (Math.abs(deltaX) > 3 || Math.abs(deltaY) > 3) {
        didPanDrag = true;
      }

      stage.scrollLeft = dragStartScrollLeft - deltaX;
      stage.scrollTop = dragStartScrollTop - deltaY;
    });

    document.addEventListener('mouseup', () => {
      if (isDragging && didPanDrag) {
        window.CROSSWAY_IGNORE_NEXT_SVG_CLICK = true;
      }
      isDragging = false;
      didPanDrag = false;
      stage.classList.remove('dragging');
    });

    loadFromMarkdown(defaultMarkdownPath);
  </script>
</body>
</html>
